{{ define "main" }}
  {{ partial "page-header" . }}

  <section class="section">
    <div class="container">
      <div class="row">
        <div class="content mb-10">
          {{ .Content }}
        </div>
      </div>
    </div>


    <div class="container">
      <div class="row">
        {{ range .RegularPages }}
          <div class="lg:col-6 md:col-6 mb-14">
            {{ partial "components/position-card" . }}
          </div>
        {{ end }}
      </div>
    </div>
  </section>
{{ end }}
